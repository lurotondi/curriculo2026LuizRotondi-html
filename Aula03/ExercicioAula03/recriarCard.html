<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExercicioAula03</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6A6ED4 0%, #7159B6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
        }

        .cardMain {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #FFFFFF;
            border-radius: 25px;
            box-shadow: 10px 20px 60px rgba(0, 0, 0, 0.25);
            width: 340px;
            padding: 40px 30px;
            gap: 16px;
        }

        /* Avatar */
        .elipse {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6A6ED4 0%, #7159B6 100%);
            border-radius: 50px;
            outline: 2px solid rgba(255, 255, 255, 0.4);
            outline-offset: -4px;
            width: 100px;
            height: 100px;
            color: #FFFFFF;
            font-size: 36px;
            font-weight: bold;
        }

        /* Nome */
        .nome {
            font-size: 22px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: -8px;
        }

        /* Cargo */
        .cargo {
            color: #6A6ED4;
            font-weight: 600;
            font-size: 15px;
        }

        /* Bio */
        .bio {
            text-align: center;
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            max-width: 260px;
        }

        /* Seção de habilidades */
        .habilidades-titulo {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A2E;
            margin-bottom: -8px;
        }

        .habilidades-lista {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            list-style: none;
        }

        .habilidades-lista li a {
            display: block;
            text-decoration: none;
            color: #6A6ED4;
            border: 1.5px solid #6A6ED4;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            transition: background 0.2s, color 0.2s;
        }

        .habilidades-lista li a:hover {
            background-color: #6A6ED4;
            color: #FFFFFF;
        }

        /* Botão */
        .btn-contato {
            display: block;
            background: linear-gradient(135deg, #6A6ED4 0%, #7159B6 100%);
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 30px;
            padding: 14px 60px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn-contato:hover {
            opacity: 0.85;
        }

    </style>
</head>


<body>

    <div class="cardMain">
        <div class="elipse">JS</div>
        <h2 class="nome">João Silva</h2>
        <p class="cargo">Desenvolvedor Front-End</p>
        <p class="bio">Apaixonado por criar experiências digitais incríveis. Especializado em HTML, CSS e JavaScript com foco em interfaces modernas e responsivas.</p>
        <h3 class="habilidades-titulo">Habilidades</h3>
        <ul class="habilidades-lista">
            <li><a href="#">HTML5</a></li>
            <li><a href="#">CSS3</a></li>
            <li><a href="#">JavaScript</a></li>
            <li><a href="#">Flexbox</a></li>
        </ul>

        <a href="#" class="btn-contato">Entre em Contato</a>
    </div>

</body>

</html>
