<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExercicioAula03</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #6A6ED4;
            background-color: linear-gradient(50deg, rgba(106, 110, 212, 1) 0%, rgba(113, 89, 182, 1) 100%);
            ;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
        }

        .cardMain {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #FFFFFF;
            border-radius: 25px;
            width: 480px;
            height: 720px;
        }

        .cardMain .elipse {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: 100;
            background-color: #6A6ED4;
            background-color: linear-gradient(50deg, rgba(106, 110, 212, 1) 0%, rgba(113, 89, 182, 1) 100%);
            ;
            border-radius: 250px;
            width: 130px;
            height: 130px;
            margin: 30px;
        }

        h1 {
            color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
        }

        ul li {
            list-style: none;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>


<body>

    <div class="cardMain">
        <h1 class="elipse">JS</h1>
        <h2>João Silva</h2>
        <p>Desenvolvedor Front-End</p>
        <p>Apaixonado por criar experiências digitais incríveis.</p>
        <p>Especializado em HTML, CSS e JavaScript com foco em</p>
        <p>interfaces modernas e responsivas.</p>
        <h3>Habilidades</h3>
        <ul>
            <li><a href="#">HTML5</a></li>
            <li><a href="#">CSS3</a></li>
            <li><a href="#">JavaScript</a></li>
            <li><a href="#">Flexbox</a></li>
        </ul>

        <h3><a href="#">Entre em Contato</a></h3>
    </div>

</body>

</html>
